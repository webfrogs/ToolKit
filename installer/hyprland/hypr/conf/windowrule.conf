# Ignore maximize requests from apps. You'll probably like this.
# windowrule = maximize 0, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus 1,match:class ^$,match:title ^$,match:xwayland 1,match:float 1,match:fullscreen 0,match:pin 0

windowrule = float 1, match:class ^com\.gabm\.satty$
windowrule = workspace 2,match:class ^google-chrome$
windowrule = workspace 4,match:class ^org\.mozilla\.Thunderbird$

windowrule {
  name=1password
  match:class=^1password$
  float=on
  size=640 480
  group=barred
}

windowrule {
  name=fix-tg-fullscreen
  match:class=^org.telegram.desktop$
  fullscreen=off
  fullscreen_state=0
}

# 文件选择窗口
windowrule {
  name = fix-open-file
  match:title = ^Open Files?$
  float=1
  # size=800 600
  max_size=2000 1000
  no_blur=on
  no_shadow=on
  border_size=0
}

# 腾讯会议
windowrule {
  name=wemeet-rule
  match:class=^wemeetapp$
  workspace=3
  float=on
}

# 解决微信弹窗显示问题
windowrule {
    name=fix-wechat
    match:class = wechat
    match:title = negative:^(朋友圈|微信|设置|聊天文件|预览|图片和视频)\W*
    no_blur=on
    no_shadow=on
    border_size=0
}
windowrule {
    name=fix-wechat-send
    match:class = wechat
    match:title = ^微信发送给$
    no_blur=on
    no_shadow=on
    border_size=0
}

# 飞书会议
windowrule {
  name=feishu-meeting-rule
  match:title=^飞书会议$
  workspace=3
  focus_on_activate=0
  no_initial_focus=1
}
